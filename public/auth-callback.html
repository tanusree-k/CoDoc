<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Authenticating... - CoDoc</title>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: #f0fdf4;
      color: #111827;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #e5e7eb;
      border-top-color: #10b981;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <h2>Completing sign in...</h2>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script>
    async function handleCallback() {
      try {
        const sb = window.supabaseClient;
        if (!sb) {
          window.location.href = '/auth.html';
          return;
        }

        const { data: { session }, error } = await sb.auth.getSession();
        
        if (error || !session) {
          window.location.href = '/auth.html?error=no_session';
          return;
        }

        const user = session.user;
        
        // Check if user has a profile
        const { data: profile } = await sb.from('profiles').select('*').eq('id', user.id).single();

        if (!profile) {
          // New user! Create profile.
          const googleName = user.user_metadata?.full_name || user.user_metadata?.name || user.email.split('@')[0];
          
          await sb.from('profiles').insert({
            id: user.id,
            username: googleName
          });
        }

        window.location.href = '/dashboard.html';
      } catch (err) {
        console.error("Callback error:", err);
        window.location.href = '/auth.html?error=callback_failed';
      }
    }

    document.addEventListener("DOMContentLoaded", handleCallback);
  </script>
</body>
</html>
