<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CoDoc – My Documents</title>
  <meta name="description" content="Your collaborative documents dashboard — create, open, and work together in real-time." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="dashboard.css?v=2" />
</head>
<body>
  <!-- Navbar -->
  <header class="navbar">
    <div class="navbar-left">
      <div class="brand">
        <div class="brand-icon">
          <svg width="20" height="20" viewBox="0 0 36 36" fill="none">
            <path d="M9 12h18M9 18h12M9 24h15" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
        </div>
        <span class="brand-name">CoDoc</span>
      </div>
    </div>
    <div class="navbar-right">
      <div class="user-info">
        <div id="user-avatar" class="avatar"></div>
        <span id="user-name" class="user-name-text"></span>
      </div>
      <button class="btn-ghost" id="logout-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sign Out
      </button>
    </div>
  </header>

  <!-- Main -->
  <main class="dash-main">
    <div class="dash-header">
      <div>
        <h1 class="dash-title">My Documents</h1>
        <p class="dash-sub">Create, open, and collaborate on your documents in real-time</p>
      </div>
      <button class="btn-primary" id="new-doc-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New Document
      </button>
    </div>

    <!-- Trending: Stats row -->
    <div class="dash-stats" id="dash-stats" style="display:none;">
      <div class="stat-card" style="animation-delay: 0ms;">
        <div class="stat-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        </div>
        <div>
          <div class="stat-value" id="stat-total">—</div>
          <div class="stat-label">Total Documents</div>
        </div>
      </div>
      <div class="stat-card" style="animation-delay: 60ms;">
        <div class="stat-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        </div>
        <div>
          <div class="stat-value" id="stat-shared">—</div>
          <div class="stat-label">Shared With Me</div>
        </div>
      </div>
      <div class="stat-card" style="animation-delay: 120ms;">
        <div class="stat-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </div>
        <div>
          <div class="stat-value" id="stat-owned">—</div>
          <div class="stat-label">Owned</div>
        </div>
      </div>
    </div>

    <!-- Search + Section header -->
    <div class="section-header">
      <span class="section-title">All Documents</span>
      <input type="text" id="doc-search" placeholder="Search documents…"
        style="padding: 8px 14px; border: 1.5px solid #e5e7eb; border-radius: 8px; font-size: 13px; outline: none; font-family: inherit; transition: border-color .2s, box-shadow .2s; min-width: 220px;"
        onfocus="this.style.borderColor='#0d9488'; this.style.boxShadow='0 0 0 3px rgba(13,148,136,.12)';"
        onblur="this.style.borderColor='#e5e7eb'; this.style.boxShadow='none';" />
    </div>

    <!-- Loading -->
    <div id="loading" class="loading-state">
      <div class="spinner"></div>
      <p>Loading your documents…</p>
    </div>

    <!-- Empty state -->
    <div id="empty-state" class="empty-state hidden">
      <div class="empty-state-icon">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      </div>
      <h3>No documents yet</h3>
      <p>Click <strong>New Document</strong> to create your first collaborative document.</p>
    </div>

    <!-- Docs grid -->
    <div id="docs-grid" class="docs-grid hidden"></div>
  </main>

  <!-- New Doc Modal -->
  <div id="new-doc-modal" class="modal-overlay hidden">
    <div class="modal-card">
      <h3>Create New Document</h3>
      <input id="new-doc-title" type="text" placeholder="Document title (optional)" maxlength="80" autocomplete="off" />
      <div class="modal-actions">
        <button class="btn-ghost" onclick="closeNewDocModal()">Cancel</button>
        <button class="btn-primary-sm" onclick="createDocument()">Create Document →</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="dashboard.js"></script>
  <script>
    // Inject stats after docs load
    const _origRender = window.renderDocs;
    document.addEventListener('docs-loaded', function(e) {
      const docs = e.detail || [];
      const total = docs.length;
      const shared = docs.filter(d => d.role !== 'owner').length;
      const owned = docs.filter(d => d.role === 'owner').length;
      const statsEl = document.getElementById('dash-stats');
      if (statsEl && total > 0) {
        document.getElementById('stat-total').textContent = total;
        document.getElementById('stat-shared').textContent = shared;
        document.getElementById('stat-owned').textContent = owned;
        statsEl.style.display = 'flex';
      }
    });
  </script>
</body>
</html>
