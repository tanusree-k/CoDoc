<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CoDoc – Sign In</title>
  <meta name="description" content="Sign in or create an account to start collaborating on CoDoc." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="auth.css" />
</head>
<body>
  <div class="auth-bg">
    <div class="auth-card">
      <!-- Logo -->
      <div class="auth-logo">
        <svg width="40" height="40" viewBox="0 0 36 36" fill="none"><rect width="36" height="36" rx="10" fill="#10b981"/><path d="M9 12h18M9 18h12M9 24h15" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/></svg>
        <span>CoDoc</span>
      </div>

      <!-- Tab switcher -->
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-signin" onclick="event.preventDefault()">Sign In</button>
        <button class="auth-tab" id="tab-guest" onclick="handleGuestLogin(event)">Guest Access</button>
      </div>

      <!-- Sign In -->
      <form id="form-signin" class="auth-form" onsubmit="handleSignIn(event)">
        <p class="auth-sub">Welcome back! Enter your credentials.</p>
        
        <button type="button" class="btn-google" onclick="handleGoogleSignIn()">
          <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.9c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
          Continue with Google
        </button>

        <div class="auth-divider">
          <span>or continue with email</span>
        </div>
        <div class="field-group">
          <label>Email</label>
          <input id="si-email" type="email" placeholder="you@example.com" required autocomplete="email" />
        </div>
        <div class="field-group">
          <label>Password</label>
          <input id="si-password" type="password" placeholder="••••••••" required autocomplete="current-password" />
        </div>
        <div id="si-error" class="auth-error hidden"></div>
        <button type="submit" class="btn-primary" id="si-btn">Sign In →</button>
      </form>

    </div>

    <!-- Decorative blobs -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="auth.js"></script>
</body>
</html>
